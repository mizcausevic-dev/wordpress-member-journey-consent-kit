name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: php scripts/prerender.php
      - name: SEO assets (robots.txt + sitemap.xml + OG)
        run: |
          DOMAIN=$(cat CNAME 2>/dev/null | tr -d '[:space:]')
          if [ -n "$DOMAIN" ]; then
            printf 'User-agent: *\nAllow: /\nSitemap: https://%s/sitemap.xml\n' "$DOMAIN" > site/robots.txt
            TODAY=$(date -u +%Y-%m-%d)
            {
              echo '<?xml version="1.0" encoding="UTF-8"?>'
              echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
              while IFS= read -r f; do
                rel=${f#site/}
                if [ "$rel" = "index.html" ]; then
                  loc="https://$DOMAIN/"
                else
                  clean=${rel%index.html}
                  loc="https://$DOMAIN/$clean"
                fi
                echo "  <url><loc>$loc</loc><lastmod>$TODAY</lastmod></url>"
              done < <(find site -name '*.html' | sort)
              echo '</urlset>'
            } > site/sitemap.xml
            node scripts/seo-meta.mjs "$DOMAIN"
          fi
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
